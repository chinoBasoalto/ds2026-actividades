    <div class="contenedor">
      <div class="seccion">
        <h1>Contacto</h1>
        <p>Completá el formulario y me contacto a la brevedad.</p>

        <form class="formulario">
          <div class="campo">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre">
          </div>

          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">
          </div>

          <div class="campo">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" required minlength="10" placeholder="Escribí tu mensaje..."></textarea>
          </div>

          <button type="submit">Enviar mensaje</button>
        </form>
      </div>
    </div>

  </body>
</html>
